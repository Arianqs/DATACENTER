<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Telemetry Station - PaaS App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0c10; color: #c5c6c7; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 40px auto; padding: 30px; background-color: #1f2833; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.6); }
        h1 { color: #66fcf1; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; font-size: 28px; }
        .subtitle { color: #86c232; margin-bottom: 25px; font-size: 14px; letter-spacing: 1px; }
        .controls { margin: 25px 0; }
        select { padding: 12px 24px; font-size: 16px; background-color: #0b0c10; color: #66fcf1; border: 2px solid #66fcf1; border-radius: 6px; cursor: pointer; outline: none; font-weight: bold; }
        .race-info { margin: 25px 0; font-size: 20px; color: #45f3ff; font-weight: 500; border-bottom: 1px solid #c5c6c722; padding-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background-color: #0b0c10; border-radius: 8px; overflow: hidden; }
        th, td { padding: 16px; text-align: left; }
        th { background-color: #151a21; color: #66fcf1; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }
        td { border-bottom: 1px solid #1f2833; font-size: 15px; }
        tr:hover { background-color: #1f283355; }
        .p1 { font-weight: bold; color: #ffd700; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Estación de Telemetría F1</h1>
        <div class="subtitle">Infraestructura Multi-Cloud: Front-End (Render PaaS) / Procesamiento (AWS EC2 IaaS)</div>
        
        <div class="controls">
            <select id="race-select" onchange="fetchTelemetry()">
                <option value="miami_sprint">Miami Grand Prix (Sprint Event)</option>
                <option value="nurburgring">Nürburgring GP Circuit</option>
            </select>
        </div>

        <div class="race-info" id="race-title">Estableciendo comunicación...</div>

        <table>
            <thead>
                <tr>
                    <th>Posición</th>
                    <th>Piloto</th>
                    <th>Escudería</th>
                    <th>Tiempo de Vuelta (Promedio)</th>
                    <th>Velocidad Punta</th>
                </tr>
            </thead>
            <tbody id="telemetry-table">
                </tbody>
        </table>
    </div>

    <script>
        // ¡IMPORTANTE! REEMPLAZA ESTO CON LA IP DE TU SERVIDOR AWS
        const AWS_IP = "TU_IP_PUBLICA_DE_AWS"; 

        async function fetchTelemetry() {
            const race = document.getElementById('race-select').value;
            const tableBody = document.getElementById('telemetry-table');
            const raceTitle = document.getElementById('race-title');
            
            try {
                const response = await fetch(`http://${AWS_IP}:5000/api/telemetry?race=${race}`);
                if (!response.ok) throw new Error("Error de respuesta de red");
                
                const data = await response.json();
                
                raceTitle.textContent = `${data.race_name} — ${data.circuit}`;
                tableBody.innerHTML = "";
                
                data.telemetry.forEach(item => {
                    const row = document.createElement('tr');
                    const positionClass = item.status === "P1" ? "class='p1'" : "";
                    
                    row.innerHTML = `
                        <td ${positionClass}>${item.status}</td>
                        <td style="font-weight: 500; color: #fff;">${item.driver}</td>
                        <td>${item.team}</td>
                        <td style="font-family: monospace; font-size: 16px;">${item.avg_lap_time}</td>
                        <td>${item.top_speed}</td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error("Fallo de conexión:", error);
                raceTitle.textContent = "Error de Enlace con la Infraestructura AWS";
                tableBody.innerHTML = "<tr><td colspan='5' style='text-align:center; color:#dc3545; font-weight:bold;'>Error crítico: No se obtuvo respuesta del Backend alojado en la instancia EC2. Asegúrate de que el puerto 5000 esté abierto en AWS y el script de Python esté en ejecución.</td></tr>";
            }
        }

        fetchTelemetry();
    </script>
</body>
</html>
