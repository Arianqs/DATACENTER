<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Data Center | IaaS & PaaS Integration</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg-dark: #09090b;
            --panel-bg: rgba(24, 24, 27, 0.65);
            --border-color: rgba(63, 63, 70, 0.4);
            --accent-blue: #0ea5e9;
            --accent-red: #ef4444;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(14, 165, 233, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(239, 68, 68, 0.05), transparent 25%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1100px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .title-block h1 {
            font-weight: 800;
            font-size: 28px;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .title-block h1 span { color: var(--accent-blue); }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        select {
            appearance: none;
            background-color: #18181b;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px 40px 12px 20px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23A1A1AA%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 10px auto;
        }

        select:hover { border-color: var(--accent-blue); }

        .race-info {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            color: var(--accent-blue);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        th {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 18px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 18px 20px;
            font-size: 15px;
            border-bottom: 1px solid rgba(63, 63, 70, 0.2);
            transition: background 0.2s;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255, 255, 255, 0.03); }

        .driver-name { font-weight: 600; color: #fff; }
        .team-name { font-size: 13px; color: var(--text-muted); display: block; margin-top: 4px; }
        .telemetry-data { font-family: 'JetBrains Mono', monospace; font-size: 15px; color: #e4e4e7; }
        
        .p1-badge {
            background: linear-gradient(135deg, #fbbf24, #d97706);
            color: #000;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
        }

        .status-error {
            color: var(--accent-red);
            background: rgba(239, 68, 68, 0.1);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <div class="title-block">
                <h1>F1 <span>Telemetry</span> Core</h1>
                <div class="subtitle"><i class="fa-solid fa-server"></i> AWS EC2 IaaS Backend &bull; <i class="fa-brands fa-git-alt"></i> Render PaaS Frontend</div>
            </div>
            <div class="live-indicator">
                <div class="pulse"></div>
                Conexión AWS Activa
            </div>
        </div>

        <div class="controls">
            <select id="race-select" onchange="fetchTelemetry()">
                <option value="miami_sprint">Miami Grand Prix (Sprint)</option>
                <option value="nurburgring">Nürburgring GP Circuit</option>
            </select>
            <div class="race-info" id="race-title">Sincronizando...</div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>POS</th>
                    <th>Piloto / Escudería</th>
                    <th>Tiempo Promedio</th>
                    <th>Velocidad Punta</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="telemetry-table">
                </tbody>
        </table>
    </div>

    <script>
        // ¡PON TU IP AQUÍ PARA QUE FUNCIONE!
        const AWS_IP = "34.239.146.172"; 

        async function fetchTelemetry() {
            const race = document.getElementById('race-select').value;
            const tableBody = document.getElementById('telemetry-table');
            const raceTitle = document.getElementById('race-title');
            
            try {
                // Hacemos el llamado a tu servidor AWS
                const response = await fetch(`http://${AWS_IP}:5000/api/telemetry?race=${race}`);
                if (!response.ok) throw new Error("Network response error");
                
                const data = await response.json();
                
                raceTitle.innerHTML = `<i class="fa-solid fa-flag-checkered"></i> ${data.circuit}`;
                tableBody.innerHTML = "";
                
                data.telemetry.forEach(item => {
                    const row = document.createElement('tr');
                    
                    const posDisplay = item.status === "P1" 
                        ? `<span class="p1-badge">P1</span>` 
                        : `<span style="color:#a1a1aa; font-weight:bold;">${item.status}</span>`;

                    row.innerHTML = `
                        <td>${posDisplay}</td>
                        <td>
                            <span class="driver-name">${item.driver}</span>
                            <span class="team-name">${item.team}</span>
                        </td>
                        <td class="telemetry-data"><i class="fa-regular fa-clock" style="color:var(--accent-blue); margin-right:5px;"></i> ${item.avg_lap_time}</td>
                        <td class="telemetry-data"><i class="fa-solid fa-gauge-high" style="color:var(--accent-red); margin-right:5px;"></i> ${item.top_speed}</td>
                        <td><span style="color:#10b981; font-size:12px; font-weight:bold;"><i class="fa-solid fa-check"></i> OK</span></td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error("Fallo de conexión:", error);
                raceTitle.innerHTML = `<span style="color:var(--accent-red);"><i class="fa-solid fa-triangle-exclamation"></i> Error de Enlace IaaS</span>`;
                tableBody.innerHTML = `<tr><td colspan='5'><div class="status-error"><i class="fa-solid fa-circle-xmark"></i> Conexión rechazada por el navegador (Mixed Content) o el puerto 5000 de tu AWS EC2 está cerrado. Revisa los permisos de 'Contenido no seguro' en Chrome.</div></td></tr>`;
            }
        }

        fetchTelemetry();
    </script>
</body>
</html>
